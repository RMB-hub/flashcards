<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>日语单词闪卡（旗舰版-54词修正版）</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: system-ui, sans-serif;
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: #f2f2f2;
    color: #222;
    transition: background .3s, color .3s;
  }
  body.dark {
    background: #1e1e1e;
    color: #eee;
  }
  h1 {
    margin: 0 0 10px;
    font-size: 20px;
    text-align: center;
  }
  .top-bar {
    position: absolute;
    top: 10px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 10px;
  }
  .top-bar button {
    padding: 6px 12px;
    font-size: 13px;
    border-radius: 999px;
    border: none;
    background: #4a90e2;
    color: #fff;
    cursor: pointer;
  }
  .card {
    width: 360px;
    height: 240px;
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.18);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 28px;
    text-align: center;
    padding: 20px;
    cursor: pointer;
    user-select: none;
    transition: background .3s, color .3s;
    transform-style: preserve-3d;
  }
  body.dark .card {
    background: #333;
    color: #eee;
  }
  .card.flip {
    animation: flip3d .4s ease;
  }
  @keyframes flip3d {
    0% { transform: rotateY(0deg); }
    50% { transform: rotateY(180deg); }
    100% { transform: rotateY(360deg); }
  }
  .buttons {
    margin-top: 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
  }
  button {
    padding: 8px 16px;
    font-size: 14px;
    border-radius: 8px;
    border: none;
    background: #4a90e2;
    color: #fff;
    cursor: pointer;
  }
  .progress-wrapper {
    margin-top: 16px;
    display: flex;
    justify-content: center;
  }
  .progress-circle {
    width: 120px;
    height: 120px;
    position: relative;
  }
  .progress-circle svg {
    transform: rotate(-90deg);
  }
  .progress-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 12px;
  }
  .progress-text span {
    display: block;
  }
  .outer-circle, .inner-circle {
    transition: stroke-dashoffset .4s ease;
  }
</style>
</head>
<body>

<div class="top-bar">
  <button id="reviewToggleBtn" onclick="toggleReviewMode()">只复习不会的</button>
  <button onclick="toggleDark()">夜间模式</button>
</div>

<h1>日语单词闪卡（旗舰版・54词）</h1>

<div class="card" id="card">点击翻面</div>

<div class="buttons">
  <button onclick="prevCard()">上一张</button>
  <button onclick="nextCard()">下一张</button>
  <button onclick="randomCard()">随机</button>
  <button onclick="toggleAuto()">自动播放</button>
  <button onclick="speak()">发音</button>
  <button onclick="markKnown()">👍 已掌握</button>
  <button onclick="markUnknown()">👎 不会</button>
</div>

<div class="progress-wrapper">
  <div class="progress-circle">
    <svg width="120" height="120">
      <circle cx="60" cy="60" r="52" stroke="#ddd" stroke-width="6" fill="none" />
      <circle id="outerCircle" class="outer-circle" cx="60" cy="60" r="52"
              stroke="#4a90e2" stroke-width="6" fill="none"
              stroke-linecap="round" />
      <circle cx="60" cy="60" r="38" stroke="#ddd" stroke-width="6" fill="none" />
      <circle id="innerCircle" class="inner-circle" cx="60" cy="60" r="38"
              stroke="#50c878" stroke-width="6" fill="none"
              stroke-linecap="round" />
    </svg>
    <div class="progress-text">
      <span id="outerText">0 / 0</span>
      <span id="innerText">已掌握 0</span>
    </div>
  </div>
</div>

<audio id="flipSound">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7b6e3c7e3e.mp3?filename=card-flip-1-108466.mp3">
</audio>

<script>
/* ------------------ 单词数据（按你图片里的 54 个） ------------------ */
const cards = [
  {kanji:"給料",   kana:"きゅうりょう", cn:"工资"},
  {kanji:"空港",   kana:"くうこう",     cn:"机场"},
  {kanji:"手",     kana:"て",           cn:"手"},
  {kanji:"渋滞",   kana:"じゅうたい",   cn:"堵车、交通拥堵"},
  {kanji:"お辞儀", kana:"おじぎ",       cn:"鞠躬、行礼"},
  {kanji:"大勢",   kana:"おおぜい",     cn:"许多人"},
  {kanji:"信号",   kana:"しんごう",     cn:"信号、红绿灯"},
  {kanji:"引越し", kana:"ひっこし",     cn:"搬家"},
  {kanji:"就職",   kana:"しゅうしょく", cn:"就职、就业"},
  {kanji:"迷惑",   kana:"めいわく",     cn:"麻烦、为难"},
  {kanji:"漢字",   kana:"かんじ",       cn:"汉字"},
  {kanji:"患者",   kana:"かんじゃ",     cn:"患者"},
  {kanji:"失礼",   kana:"しつれい",     cn:"失礼、对不起"},
  {kanji:"階段",   kana:"かいだん",     cn:"楼梯、台阶"},
  {kanji:"人間",   kana:"にんげん",     cn:"人、人类"},
  {kanji:"宅配便", kana:"たくはいびん", cn:"送货上门、快递"},
  {kanji:"列車",   kana:"れっしゃ",     cn:"列车"},
  {kanji:"運転手", kana:"うんてんしゅ", cn:"司机"},
  {kanji:"本場",   kana:"ほんば",       cn:"发源地、本场、正宗地方"},
  {kanji:"帽子",   kana:"ぼうし",       cn:"帽子"},
  {kanji:"子",     kana:"こ",           cn:"孩子"},
  {kanji:"台風",   kana:"たいふう",     cn:"台风"},
  {kanji:"最高",   kana:"さいこう",     cn:"最高、最好"},
  {kanji:"天気予報", kana:"てんきよほう", cn:"天气预报"},
  {kanji:"大人",   kana:"おとな",       cn:"大人"},
  {kanji:"ご主人", kana:"ごしゅじん",   cn:"丈夫、主人"},
  {kanji:"成績",   kana:"せいせき",     cn:"成绩"},
  {kanji:"卵焼き", kana:"たまごやき",   cn:"鸡蛋卷、煎蛋卷"},
  {kanji:"案内",   kana:"あんない",     cn:"向导、引导、指南"},
  {kanji:"着物",   kana:"きもの",       cn:"和服"},
  {kanji:"塩",     kana:"しお",         cn:"盐"},
  {kanji:"用事",   kana:"ようじ",       cn:"事情、要事"},
  {kanji:"成功",   kana:"せいこう",     cn:"成功"},
  {kanji:"邪魔",   kana:"じゃま",       cn:"妨碍、打扰"},
  {kanji:"遠慮",   kana:"えんりょ",     cn:"客气、推辞"},
  {kanji:"具合",   kana:"ぐあい",       cn:"情况、状态"},
  {kanji:"試合",   kana:"しあい",       cn:"比赛"},
  {kanji:"丈夫",   kana:"じょうぶ",     cn:"结实、健康"},
  {kanji:"変",     kana:"へん",         cn:"奇怪、异常"},
  {kanji:"輸出",   kana:"ゆしゅつ",     cn:"出口、输出"},
  {kanji:"豊か",   kana:"ゆたか",       cn:"丰富、富裕"},
  {kanji:"楽しみ", kana:"たのしみ",     cn:"乐趣、期待"},
  {kanji:"機嫌",   kana:"きげん",       cn:"心情、情绪"},
  {kanji:"お手伝い", kana:"おてつだい", cn:"帮忙、帮手"},
  {kanji:"残念",   kana:"ざんねん",     cn:"遗憾、可惜"},
  {kanji:"お年寄り", kana:"おとしより", cn:"老人"},
  {kanji:"出荷",   kana:"しゅっか",     cn:"出货、装运"},
  {kanji:"意味",   kana:"いみ",         cn:"意思、含义"},
  {kanji:"娘",     kana:"むすめ",       cn:"女儿、姑娘"},
  {kanji:"嵐",     kana:"あらし",       cn:"暴风雨、风暴"},
  {kanji:"雰囲気", kana:"ふんいき",     cn:"气氛、氛围"},
  {kanji:"お返事", kana:"おへんじ",     cn:"回信、回复"},
  {kanji:"大事",   kana:"だいじ",       cn:"重要、宝贵"},
  {kanji:"昔",     kana:"むかし",       cn:"从前、过去"},
  {kanji:"出身",   kana:"しゅっしん",   cn:"出身、籍贯"}
];

/* ------------------ 状态 ------------------ */
let pool = cards.map((_, i) => i);
let poolIndex = 0;
let showingFront = true;
let autoPlay = null;
let reviewMode = false;
let mastered = new Array(cards.length).fill(false);

const cardEl = document.getElementById("card");
const flipSound = document.getElementById("flipSound");
const reviewToggleBtn = document.getElementById("reviewToggleBtn");
const outerCircle = document.getElementById("outerCircle");
const innerCircle = document.getElementById("innerCircle");
const outerText = document.getElementById("outerText");
const innerText = document.getElementById("innerText");

const outerR = 52;
const innerR = 38;
const outerLen = 2 * Math.PI * outerR;
const innerLen = 2 * Math.PI * innerR;
outerCircle.setAttribute("stroke-dasharray", outerLen);
innerCircle.setAttribute("stroke-dasharray", innerLen);

/* ------------------ 初始化 ------------------ */
function currentCardIndex() {
  return pool[poolIndex];
}

function renderCard() {
  const idx = currentCardIndex();
  if (showingFront) {
    cardEl.textContent = `${cards[idx].kanji}（${cards[idx].kana}）`;
  } else {
    cardEl.textContent = cards[idx].cn;
  }
}

function updateProgress() {
  const total = pool.length;
  const globalTotal = cards.length;
  const currentPos = poolIndex + 1;
  const masteredCount = mastered.filter(v => v).length;

  const outerPercent = total === 0 ? 0 : currentPos / total;
  const innerPercent = globalTotal === 0 ? 0 : masteredCount / globalTotal;

  outerCircle.style.strokeDashoffset = outerLen * (1 - outerPercent);
  innerCircle.style.strokeDashoffset = innerLen * (1 - innerPercent);

  outerText.textContent = total === 0 ? "0 / 0" : `${currentPos} / ${total}`;
  innerText.textContent = `已掌握 ${masteredCount}`;
}

function refresh() {
  showingFront = true;
  renderCard();
  updateProgress();
}

/* ------------------ 卡片翻转 ------------------ */
cardEl.addEventListener("click", () => flip());

function flip() {
  flipSound.currentTime = 0;
  flipSound.play();
  cardEl.classList.remove("flip");
  void cardEl.offsetWidth;
  cardEl.classList.add("flip");
  showingFront = !showingFront;
  setTimeout(() => {
    renderCard();
  }, 200);
}

/* ------------------ 导航（含自动发音） ------------------ */
function nextCard() {
  if (pool.length === 0) return;
  poolIndex = (poolIndex + 1) % pool.length;
  refresh();
  speak(true);
}

function prevCard() {
  if (pool.length === 0) return;
  poolIndex = (poolIndex - 1 + pool.length) % pool.length;
  refresh();
  speak(true);
}

function randomCard() {
  if (pool.length === 0) return;
  poolIndex = Math.floor(Math.random() * pool.length);
  refresh();
  speak(true);
}

/* ------------------ 自动播放 ------------------ */
function toggleAuto() {
  if (autoPlay) {
    clearInterval(autoPlay);
    autoPlay = null;
    alert("自动播放已关闭");
  } else {
    autoPlay = setInterval(nextCard, 2000);
    alert("自动播放已开启（每 2 秒切换）");
  }
}

/* ------------------ 发音（只读 kana + 自动发音） ------------------ */
let jpVoice = null;

function loadVoices() {
  const voices = speechSynthesis.getVoices();
  jpVoice = voices.find(v => v.lang === "ja-JP") || voices[0] || null;
}
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

function speak(auto = false) {
  const idx = currentCardIndex();
  const text = cards[idx].kana;
  if (speechSynthesis.speaking) {
    if (auto) return;
    speechSynthesis.cancel();
  }
  const utter = new SpeechSynthesisUtterance(text);
  if (jpVoice) utter.voice = jpVoice;
  utter.lang = "ja-JP";
  speechSynthesis.speak(utter);
}

/* ------------------ 夜间模式 ------------------ */
function toggleDark() {
  document.body.classList.toggle("dark");
}

/* ------------------ 掌握标记 ------------------ */
function markKnown() {
  const idx = currentCardIndex();
  mastered[idx] = true;
  updateProgress();
}

function markUnknown() {
  const idx = currentCardIndex();
  mastered[idx] = false;
  updateProgress();
}

/* ------------------ 复习模式 ------------------ */
function toggleReviewMode() {
  if (!reviewMode) {
    const reviewPool = cards.map((_, i) => i).filter(i => !mastered[i]);
    if (reviewPool.length === 0) {
      alert("太强了！目前没有标记为“不会”的单词。");
      return;
    }
    pool = reviewPool;
    poolIndex = 0;
    reviewMode = true;
    reviewToggleBtn.textContent = "退出复习模式";
    refresh();
    speak(true);
  } else {
    pool = cards.map((_, i) => i);
    poolIndex = 0;
    reviewMode = false;
    reviewToggleBtn.textContent = "只复习不会的";
    refresh();
    speak(true);
  }
}

/* ------------------ 启动 ------------------ */
refresh();
speak(true);
</script>

</body>
</html>
